[data]
path = "../data/raw/example_strategies_ohlcv.csv"

[benchmark]
path = "../data/raw/example_benchmark_returns.csv"
name = "Synthetic Benchmark"
return_column = "benchmark_return"
rolling_window = 3

[dataset]
forward_horizons = [1]
volatility_window = 3
average_volume_window = 3

[universe]
min_price = 95.0
min_average_volume = 14000000.0
min_average_dollar_volume = 1400000000.0
min_listing_history_days = 3
lag = 1
average_volume_window = 3
average_dollar_volume_window = 3

[signal]
name = "momentum"
lookback = 2

[portfolio]
construction = "long_only"
top_n = 2
weighting = "score"
exposure = 1.0
max_position_weight = 0.6

[backtest]
signal_delay = 1
rebalance_frequency = "weekly"
commission_bps = 2.0
slippage_bps = 3.0
max_turnover = 0.75
initial_nav = 1.0

[diagnostics]
forward_return_column = "forward_return_1d"
ic_method = "pearson"
n_quantiles = 2
min_observations = 2
