[data]
path = "../data/raw/example_strategies_ohlcv.csv"

[benchmark]
path = "../data/raw/example_benchmark_returns.csv"
name = "Synthetic Benchmark"
return_column = "benchmark_return"
rolling_window = 3

[dataset]
forward_horizons = [1]
volatility_window = 3
average_volume_window = 3
include_market_cap = true
market_cap_bucket_count = 2

[shares_outstanding]
path = "../data/raw/example_shares_outstanding.csv"
effective_date_column = "effective_date"
shares_outstanding_column = "shares_outstanding"

[signal]
name = "momentum"
lookback = 2

[portfolio]
construction = "long_only"
top_n = 2
weighting = "score"
exposure = 1.0
max_position_weight = 0.6

[backtest]
signal_delay = 1
rebalance_frequency = "weekly"
commission_bps = 2.0
slippage_bps = 3.0
max_turnover = 0.75
initial_nav = 1.0

[diagnostics]
forward_return_column = "forward_return_1d"
ic_method = "pearson"
n_quantiles = 2
min_observations = 2
group_columns = ["market_cap_bucket"]
