[data]
path = "../data/raw/example_strategies_ohlcv.csv"

[dataset]
forward_horizons = [1]
volatility_window = 3
average_volume_window = 3

[signal]
name = "mean_reversion"
lookback = 1

[portfolio]
construction = "long_short"
top_n = 1
bottom_n = 1
weighting = "equal"
long_exposure = 1.0
short_exposure = 1.0

[backtest]
signal_delay = 1
transaction_cost_bps = 5.0
initial_nav = 1.0

[diagnostics]
forward_return_column = "forward_return_1d"
ic_method = "spearman"
n_quantiles = 2
min_observations = 4
